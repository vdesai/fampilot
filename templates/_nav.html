<style>
.top-nav-wrap {
    background: rgba(0, 0, 0, 0.3);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    position: sticky;
    top: 0;
    z-index: 100;
}
.top-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    max-width: 760px;
    margin: 0 auto;
    padding: 10px 16px;
    gap: 10px;
}
.nav-brand {
    color: white;
    text-decoration: none;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.3px;
    display: flex;
    align-items: center;
    gap: 5px;
    flex-shrink: 0;
}
.nav-brand:hover { opacity: 0.85; }
.nav-links { display: flex; gap: 6px; }
.nav-link {
    color: rgba(255, 255, 255, 0.95);
    text-decoration: none;
    font-size: 13px;
    font-weight: 600;
    padding: 6px 12px;
    border: 1.5px solid rgba(255, 255, 255, 0.3);
    border-radius: 8px;
    transition: background 0.15s, border-color 0.15s;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 4px;
}
.nav-link:hover {
    background: rgba(255, 255, 255, 0.15);
    border-color: rgba(255, 255, 255, 0.5);
}
.nav-link.nav-active {
    background: rgba(255, 255, 255, 0.22);
    border-color: rgba(255, 255, 255, 0.6);
    color: white;
}
@media (max-width: 400px) {
    .nav-link { padding: 6px 9px; font-size: 12px; }
    .nav-brand { font-size: 15px; }
}

/* ── Global Voice FAB ── */
.gv-fab {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    font-size: 26px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(102,126,234,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 90;
    transition: transform 0.15s, box-shadow 0.15s;
}
.gv-fab:hover {
    transform: scale(1.08);
    box-shadow: 0 6px 28px rgba(102,126,234,0.5);
}
.gv-fab.gv-listening {
    background: #ff4444;
    animation: gvPulse 1.2s ease-in-out infinite;
}
@keyframes gvPulse {
    0%, 100% { transform: scale(1); box-shadow: 0 4px 20px rgba(255,68,68,0.4); }
    50% { transform: scale(1.1); box-shadow: 0 6px 30px rgba(255,68,68,0.6); }
}
.gv-text {
    position: fixed;
    bottom: 94px;
    left: 20px;
    right: 20px;
    text-align: center;
    font-size: 14px;
    font-weight: 600;
    z-index: 91;
    color: white;
    text-shadow: 0 1px 6px rgba(0,0,0,0.5);
    pointer-events: none;
}
.gv-toast {
    position: fixed;
    bottom: 100px;
    left: 20px;
    right: 20px;
    max-width: 440px;
    margin: 0 auto;
    background: white;
    border-radius: 14px;
    padding: 16px 20px;
    box-shadow: 0 6px 24px rgba(0,0,0,0.15);
    z-index: 91;
    animation: gvSlideUp 0.3s ease-out;
}
@keyframes gvSlideUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
}
.gv-toast-text {
    font-size: 15px;
    font-weight: 600;
    color: #333;
    margin-bottom: 4px;
}
.gv-toast-detail {
    font-size: 13px;
    color: #667eea;
}
.gv-toast-close {
    position: absolute;
    top: 10px;
    right: 12px;
    background: none;
    border: none;
    color: #ccc;
    font-size: 18px;
    cursor: pointer;
}
</style>

<div class="top-nav-wrap">
    <nav class="top-nav">
        <a href="/" class="nav-brand">FamPilot</a>
        <div class="nav-links">
            <a href="/" class="nav-link {% if nav_page == 'home' %}nav-active{% endif %}">+ New</a>
            <a href="/lists" class="nav-link {% if nav_page == 'lists' %}nav-active{% endif %}">Lists</a>
            <a href="/chores" class="nav-link {% if nav_page == 'chores' %}nav-active{% endif %}">Chores</a>
            <a href="/meals" class="nav-link {% if nav_page == 'meals' %}nav-active{% endif %}">Meals</a>
            <a href="/history" class="nav-link {% if nav_page == 'history' %}nav-active{% endif %}">History</a>
        </div>
    </nav>
</div>

<!-- Global voice FAB — appears on every page -->
<button class="gv-fab" id="gvFab" onclick="gvToggle()">🎙️</button>
<div class="gv-text" id="gvText" style="display:none;"></div>

<script>
(function() {
    let _gvRec = null, _gvOn = false;

    window.gvToggle = function() {
        _gvOn ? gvStop() : gvStart();
    };

    function gvStart() {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) { alert('Speech not supported. Try Chrome or Safari.'); return; }

        _gvRec = new SR();
        _gvRec.continuous = false;
        _gvRec.interimResults = true;
        _gvRec.lang = 'en-US';
        _gvOn = true;

        document.getElementById('gvFab').classList.add('gv-listening');
        gvShow('Listening...');

        _gvRec.onresult = (e) => {
            let t = '';
            for (let i = 0; i < e.results.length; i++) t += e.results[i][0].transcript;
            gvShow(t || 'Listening...');
            if (e.results[e.results.length - 1].isFinal) gvExec(t.trim());
        };
        _gvRec.onend = () => { gvCleanup(); };
        _gvRec.onerror = () => { gvCleanup(); };
        _gvRec.start();
    }

    function gvStop() {
        if (_gvRec) _gvRec.stop();
        gvCleanup();
    }

    function gvCleanup() {
        _gvOn = false;
        document.getElementById('gvFab').classList.remove('gv-listening');
        document.getElementById('gvText').style.display = 'none';
    }

    function gvShow(msg) {
        const el = document.getElementById('gvText');
        el.textContent = msg;
        el.style.display = 'block';
    }

    async function gvExec(text) {
        if (!text) return;
        gvShow('Processing...');

        try {
            const res = await fetch('/api/voice-command', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `text=${encodeURIComponent(text)}`,
            });
            const data = await res.json();
            document.getElementById('gvText').style.display = 'none';
            gvHandleResult(data, text);
        } catch (err) {
            document.getElementById('gvText').style.display = 'none';
            gvToast('Something went wrong', 'Please try again.');
        }
    }

    function gvHandleResult(data, original) {
        if (data.action === 'added_to_list') {
            gvToast(
                `Added ${data.items.length} item${data.items.length === 1 ? '' : 's'} to ${data.list_name}`,
                data.items.map(i => i.text).join(', ')
            );
            // If we're on that list page, reload to show new items
            if (window.location.pathname === `/lists/${data.list_id}`) {
                setTimeout(() => window.location.reload(), 1200);
            }
        } else if (data.action === 'created_list_and_added') {
            gvToast(
                `Created "${data.list_name}" with ${data.items.length} item${data.items.length === 1 ? '' : 's'}`,
                data.items.map(i => i.text).join(', ')
            );
        } else if (data.action === 'chore_done') {
            gvToast(`Marked "${data.chore_title}" as done`, data.streak > 1 ? `${data.streak} day streak!` : '');
            if (window.location.pathname === '/chores') {
                setTimeout(() => window.location.reload(), 1200);
            }
        } else if (data.action === 'chore_created') {
            gvToast(`Added chore: ${data.title}`, data.assigned_to ? `Assigned to ${data.assigned_to}` : 'For everyone');
            if (window.location.pathname === '/chores') {
                setTimeout(() => window.location.reload(), 1200);
            }
        } else if (data.action === 'meal_plan_generated') {
            gvToast(`Meal plan generated!`, `${data.days}-day plan ready`);
            setTimeout(() => window.location.href = '/meals', 1200);
        } else if (data.action === 'error') {
            gvToast('Error', data.message || 'Something went wrong. Please try again.');
        } else if (data.action === 'create_event') {
            gvToast('Creating event...', '');
            const form = document.createElement('form');
            form.method = 'POST';
            form.action = '/process-text';
            const input = document.createElement('input');
            input.type = 'hidden';
            input.name = 'text';
            input.value = data.text || original;
            form.appendChild(input);
            document.body.appendChild(form);
            form.submit();
        } else {
            gvToast(`"${original}"`, 'Not sure what to do. Try: "add milk to groceries" or "mark dishes done"');
        }
    }

    function gvToast(title, detail) {
        document.getElementById('gvToastEl')?.remove();
        const div = document.createElement('div');
        div.className = 'gv-toast';
        div.id = 'gvToastEl';
        div.innerHTML = `
            <button class="gv-toast-close" onclick="this.parentElement.remove()">×</button>
            <div class="gv-toast-text">${esc(title)}</div>
            ${detail ? `<div class="gv-toast-detail">${esc(detail)}</div>` : ''}
        `;
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 5000);
    }

    function esc(s) {
        const d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }
})();
</script>
