<style>
/* ── Top Bar ── */
.top-bar {
    background: white;
    border-bottom: 1px solid #f0f0f0;
    position: sticky;
    top: 0;
    z-index: 100;
    padding: 10px 16px;
}
.top-bar-inner {
    max-width: 540px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
}
.top-brand {
    font-size: 20px;
    font-weight: 800;
    color: #667eea;
    text-decoration: none;
    letter-spacing: -0.5px;
}
.top-search {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: #f5f5f7;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.15s;
}
.top-search:hover { background: #e8e8ea; }

/* ── Bottom Tab Bar ── */
.bottom-tabs {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: white;
    border-top: 1px solid #f0f0f0;
    z-index: 100;
    padding-bottom: env(safe-area-inset-bottom);
}
.bottom-tabs-inner {
    max-width: 540px;
    margin: 0 auto;
    display: flex;
    justify-content: space-around;
    padding: 6px 0 4px;
}
.tab-link {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    text-decoration: none;
    padding: 4px 8px;
    min-width: 56px;
    transition: color 0.15s;
}
.tab-icon {
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
}
.tab-icon svg {
    stroke: #999;
    transition: stroke 0.15s;
}
.tab-label {
    font-size: 10px;
    font-weight: 600;
    color: #999;
    transition: color 0.15s;
}
.tab-link.tab-active .tab-icon svg { stroke: #667eea; }
.tab-link.tab-active .tab-label { color: #667eea; }

/* Hide old nav-link stuff */
.nav-link, .nav-links, .top-nav-wrap, .top-nav { display: none !important; }

/* ── Global Voice FAB ── */
.gv-fab {
    position: fixed;
    bottom: 80px;
    right: 20px;
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: #ffffff;
    color: #667eea;
    border: 3px solid #667eea;
    font-size: 28px;
    cursor: pointer;
    box-shadow: 0 4px 24px rgba(0,0,0,0.2), 0 0 0 4px rgba(102,126,234,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 90;
    transition: transform 0.15s, box-shadow 0.15s;
}
.gv-fab:hover {
    transform: scale(1.1);
    box-shadow: 0 6px 32px rgba(0,0,0,0.25), 0 0 0 6px rgba(102,126,234,0.2);
}
.gv-fab.gv-listening {
    background: #ff4444;
    color: white;
    border-color: #ff4444;
    animation: gvPulse 1.2s ease-in-out infinite;
}
@keyframes gvPulse {
    0%, 100% { transform: scale(1); box-shadow: 0 4px 20px rgba(255,68,68,0.4), 0 0 0 4px rgba(255,68,68,0.2); }
    50% { transform: scale(1.1); box-shadow: 0 6px 30px rgba(255,68,68,0.6), 0 0 0 8px rgba(255,68,68,0.15); }
}
/* Label under mic on first visit */
.gv-label {
    position: fixed;
    bottom: 92px;
    right: 16px;
    background: white;
    color: #333;
    font-size: 12px;
    font-weight: 600;
    padding: 6px 12px;
    border-radius: 8px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    z-index: 90;
    animation: gvLabelBounce 2s ease-in-out infinite;
    pointer-events: none;
}
.gv-label::after {
    content: '';
    position: absolute;
    bottom: -6px;
    right: 24px;
    width: 12px;
    height: 12px;
    background: white;
    transform: rotate(45deg);
    box-shadow: 2px 2px 4px rgba(0,0,0,0.08);
}
@keyframes gvLabelBounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-4px); }
}
.gv-text {
    position: fixed;
    bottom: 96px;
    left: 20px;
    right: 20px;
    text-align: center;
    font-size: 15px;
    font-weight: 600;
    z-index: 91;
    color: #333;
    background: white;
    padding: 12px 20px;
    border-radius: 14px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    max-width: 440px;
    margin: 0 auto;
    pointer-events: none;
    animation: gvSlideUp 0.2s ease-out;
    text-shadow: none;
}
.gv-toast {
    position: fixed;
    bottom: 100px;
    left: 20px;
    right: 20px;
    max-width: 440px;
    margin: 0 auto;
    background: white;
    border-radius: 14px;
    padding: 16px 20px;
    box-shadow: 0 6px 24px rgba(0,0,0,0.15);
    z-index: 91;
    animation: gvSlideUp 0.3s ease-out;
}
@keyframes gvSlideUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
}
.gv-toast-text {
    font-size: 15px;
    font-weight: 600;
    color: #333;
    margin-bottom: 4px;
}
.gv-toast-detail {
    font-size: 13px;
    color: #667eea;
}
.gv-toast-close {
    position: absolute;
    top: 10px;
    right: 12px;
    background: none;
    border: none;
    color: #ccc;
    font-size: 18px;
    cursor: pointer;
}
</style>

<!-- Top Bar -->
<div class="top-bar">
    <div class="top-bar-inner">
        <a href="/" class="top-brand">FamPilot</a>
        <a href="/ask" class="top-search" title="Ask FamPilot">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </a>
    </div>
</div>

<!-- Bottom Tab Bar -->
<nav class="bottom-tabs">
    <div class="bottom-tabs-inner">
        <a href="/" class="tab-link {% if nav_page == 'home' %}tab-active{% endif %}">
            <span class="tab-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span>
            <span class="tab-label">Home</span>
        </a>
        <a href="/lists" class="tab-link {% if nav_page == 'lists' %}tab-active{% endif %}">
            <span class="tab-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg></span>
            <span class="tab-label">Lists</span>
        </a>
        <a href="/calendar" class="tab-link {% if nav_page == 'calendar' %}tab-active{% endif %}">
            <span class="tab-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span>
            <span class="tab-label">Calendar</span>
        </a>
        <a href="/meals" class="tab-link {% if nav_page == 'meals' %}tab-active{% endif %}">
            <span class="tab-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3v7"/></svg></span>
            <span class="tab-label">Meals</span>
        </a>
        <a href="/chores" class="tab-link {% if nav_page == 'chores' %}tab-active{% endif %}">
            <span class="tab-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></span>
            <span class="tab-label">Chores</span>
        </a>
    </div>
</nav>

<!-- Global voice FAB — appears on every page -->
<button class="gv-fab" id="gvFab" onclick="gvToggle()">🎙️</button>
<div class="gv-label" id="gvLabel">Tap to talk</div>
<div class="gv-text" id="gvText" style="display:none;"></div>

<script>
(function() {
    let _gvRec = null, _gvOn = false;

    window.gvToggle = function() {
        // Hide the tooltip label permanently
        const label = document.getElementById('gvLabel');
        if (label) { label.style.display = 'none'; localStorage.setItem('gv_used', '1'); }
        _gvOn ? gvStop() : gvStart();
    };
    // Hide label if user has used mic before
    if (localStorage.getItem('gv_used')) {
        const label = document.getElementById('gvLabel');
        if (label) label.style.display = 'none';
    }

    let _gvTimeout = null;
    let _gvGotResult = false;
    let _gvErrorHandled = false;

    function gvStart() {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) {
            gvToast('Voice not supported here', 'Try opening FamPilot in Safari or Chrome directly.');
            return;
        }

        _gvRec = new SR();
        _gvRec.continuous = false;
        _gvRec.interimResults = true;
        _gvRec.lang = 'en-US';
        _gvOn = true;
        _gvGotResult = false;
        _gvErrorHandled = false;

        document.getElementById('gvFab').classList.add('gv-listening');
        gvShow('Listening...');

        // Auto-stop after 10 seconds of listening
        _gvTimeout = setTimeout(() => { if (_gvOn) gvStop(); }, 10000);

        _gvRec.onresult = (e) => {
            let t = '';
            for (let i = 0; i < e.results.length; i++) t += e.results[i][0].transcript;
            if (t) _gvGotResult = true;
            gvShow(t || 'Listening...');
            if (e.results[e.results.length - 1].isFinal) {
                clearTimeout(_gvTimeout);
                gvExec(t.trim());
            }
        };
        _gvRec.onend = () => {
            clearTimeout(_gvTimeout);
            gvCleanup();
            // If recognition ended without ever producing a transcript and no
            // error handler already surfaced feedback, tell the user.
            if (!_gvGotResult && !_gvErrorHandled) {
                gvToast("Didn't catch that", "Tap the mic and try again — speak a bit louder or closer.");
            }
        };
        _gvRec.onerror = (e) => {
            clearTimeout(_gvTimeout);
            _gvErrorHandled = true;
            const code = (e && e.error) || '';
            let title = "Mic didn't work";
            let detail = 'Tap the mic and try again.';
            if (code === 'not-allowed' || code === 'service-not-allowed') {
                title = 'Microphone blocked';
                detail = 'Allow mic access in your browser settings, then try again.';
            } else if (code === 'no-speech') {
                title = "Didn't hear anything";
                detail = 'Tap the mic and speak a bit louder.';
            } else if (code === 'audio-capture') {
                title = 'No microphone found';
                detail = 'Check that your device has a working mic.';
            } else if (code === 'network') {
                title = 'Network error';
                detail = "Speech needs a connection — check your internet and retry.";
            }
            gvCleanup();
            gvToast(title, detail);
        };
        try {
            _gvRec.start();
        } catch (err) {
            gvCleanup();
            gvToast("Couldn't start mic", 'Tap the mic again in a moment.');
        }
    }

    function gvStop() {
        clearTimeout(_gvTimeout);
        if (_gvRec) _gvRec.stop();
        gvCleanup();
    }

    // Stop mic when user leaves the page or switches apps
    document.addEventListener('visibilitychange', () => {
        if (document.hidden && _gvOn) gvStop();
    });

    function gvCleanup() {
        _gvOn = false;
        document.getElementById('gvFab').classList.remove('gv-listening');
        document.getElementById('gvText').style.display = 'none';
    }

    function gvShow(msg) {
        const el = document.getElementById('gvText');
        el.textContent = msg;
        el.style.display = 'block';
    }

    window.gvExec = async function gvExec(text) {
        if (!text) return;
        gvShow('Processing...');

        try {
            const res = await fetch('/api/voice-command', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `text=${encodeURIComponent(text)}`,
            });
            const data = await res.json();
            document.getElementById('gvText').style.display = 'none';
            gvHandleResult(data, text);
        } catch (err) {
            document.getElementById('gvText').style.display = 'none';
            gvToast('Something went wrong', 'Please try again.');
        }
    }

    function gvHandleResult(data, original) {
        if (data.action === 'added_to_list') {
            gvToast(
                `Added ${data.items.length} item${data.items.length === 1 ? '' : 's'} to ${data.list_name}`,
                data.items.map(i => i.text).join(', ')
            );
            // If we're on that list page, reload to show new items
            if (window.location.pathname === `/lists/${data.list_id}`) {
                setTimeout(() => window.location.reload(), 1200);
            }
        } else if (data.action === 'created_list_and_added') {
            gvToast(
                `Created "${data.list_name}" with ${data.items.length} item${data.items.length === 1 ? '' : 's'}`,
                data.items.map(i => i.text).join(', ')
            );
        } else if (data.action === 'chore_done') {
            gvToast(`Marked "${data.chore_title}" as done`, data.streak > 1 ? `${data.streak} day streak!` : '');
            if (window.location.pathname === '/chores') {
                setTimeout(() => window.location.reload(), 1200);
            }
        } else if (data.action === 'chore_created') {
            gvToast(`Added chore: ${data.title}`, data.assigned_to ? `Assigned to ${data.assigned_to}` : 'For everyone');
            if (window.location.pathname === '/chores') {
                setTimeout(() => window.location.reload(), 1200);
            }
        } else if (data.action === 'added_to_inventory') {
            gvToast(
                `Added ${data.items.length} item${data.items.length === 1 ? '' : 's'} to Pantry`,
                data.items.map(i => i.text).join(', ')
            );
            if (window.location.pathname === `/lists/${data.list_id}`) {
                setTimeout(() => window.location.reload(), 1200);
            }
        } else if (data.action === 'meal_plan_generated') {
            gvToast(`Meal plan generated!`, `${data.days}-day plan ready`);
            setTimeout(() => window.location.href = '/meals', 1200);
        } else if (data.action === 'error') {
            gvToast('Error', data.message || 'Something went wrong. Please try again.');
        } else if (data.action === 'create_event') {
            gvToast('Creating event...', '');
            const form = document.createElement('form');
            form.method = 'POST';
            form.action = '/process-text';
            const input = document.createElement('input');
            input.type = 'hidden';
            input.name = 'text';
            input.value = data.text || original;
            form.appendChild(input);
            document.body.appendChild(form);
            form.submit();
        } else {
            gvToast(`"${original}"`, 'Not sure what to do. Try: "add milk to groceries" or "mark dishes done"');
        }
    }

    function gvToast(title, detail) {
        document.getElementById('gvToastEl')?.remove();
        const div = document.createElement('div');
        div.className = 'gv-toast';
        div.id = 'gvToastEl';
        div.innerHTML = `
            <button class="gv-toast-close" onclick="this.parentElement.remove()">×</button>
            <div class="gv-toast-text">${esc(title)}</div>
            ${detail ? `<div class="gv-toast-detail">${esc(detail)}</div>` : ''}
        `;
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 5000);
    }

    function esc(s) {
        const d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }
})();
</script>
