<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Family – FamPilot</title>
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="/static/manifest.json">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 420px;
            width: 100%;
            animation: fadeIn 0.6s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .header {
            text-align: center;
            margin-bottom: 28px;
        }
        .logo { font-size: 56px; margin-bottom: 12px; }
        .header h1 {
            font-size: 28px;
            color: white;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .header p {
            color: rgba(255,255,255,0.85);
            font-size: 16px;
        }
        .family-name-highlight {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            padding: 2px 10px;
            border-radius: 8px;
            font-weight: 700;
            color: white;
        }

        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
        }
        .card-body { padding: 32px; }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #555;
            margin-bottom: 6px;
        }
        input[type="text"] {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
            color: #333;
            transition: border-color 0.2s;
            margin-bottom: 18px;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        input::placeholder { color: #bbb; }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 10px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102,126,234,0.3);
            transition: all 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102,126,234,0.4);
        }

        .footer {
            text-align: center;
            margin-top: 20px;
        }
        .footer a {
            color: rgba(255,255,255,0.7);
            font-size: 13px;
            text-decoration: none;
        }
        .footer a:hover { color: white; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">👨‍👩‍👧‍👦</div>
            <h1>Join Family</h1>
            <p>You've been invited to join<br><span class="family-name-highlight">{{ family_name }}</span></p>
        </div>

        <div class="card">
            <div class="card-body">
                <form action="/join/{{ code }}" method="post">
                    <label for="your_name">What should we call you?</label>
                    <input type="text" id="your_name" name="your_name" placeholder="Mom, Dad, Alex..." autofocus>

                    <button type="submit" class="btn">Join {{ family_name }}</button>
                </form>
            </div>
        </div>

        <div class="footer">
            <a href="/welcome">or create your own family</a>
        </div>
    </div>
</body>
</html>
