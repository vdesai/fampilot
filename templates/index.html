<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FamPilot - Event Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            font-size: 64px;
            margin-bottom: 15px;
            animation: bounce 1s ease-out;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        .header h1 {
            font-size: 36px;
            color: white;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .header p {
            color: rgba(255, 255, 255, 0.95);
            font-size: 16px;
        }

        /* Main Card */
        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
            overflow: hidden;
        }

        .card-body {
            padding: 40px;
        }

        /* Upload Area */
        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 12px;
            padding: 50px 30px;
            text-align: center;
            background: linear-gradient(135deg, #f8f9ff 0%, #f0f2ff 100%);
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
            position: relative;
        }

        .upload-area:hover {
            border-color: #764ba2;
            background: linear-gradient(135deg, #f0f2ff 0%, #e8ebff 100%);
            transform: translateY(-2px);
        }

        .upload-area.dragover {
            border-color: #764ba2;
            background: linear-gradient(135deg, #e8ebff 0%, #dde1ff 100%);
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 56px;
            margin-bottom: 15px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        .upload-text {
            color: #667eea;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .upload-subtext {
            color: #999;
            font-size: 14px;
        }

        input[type="file"] {
            display: none;
        }

        /* Selected File Display */
        .file-name {
            margin-bottom: 20px;
            padding: 16px 20px;
            background: linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%);
            border-radius: 10px;
            color: #155724;
            font-size: 15px;
            font-weight: 500;
            display: none;
            align-items: center;
            gap: 10px;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .file-name.show {
            display: flex;
        }

        .file-name-icon {
            font-size: 20px;
        }

        /* Submit Button */
        button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        button:active:not(:disabled) {
            transform: translateY(0);
        }

        button:disabled {
            background: linear-gradient(135deg, #ccc 0%, #999 100%);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
            opacity: 0.6;
        }

        button .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        button.loading .spinner {
            display: block;
        }

        button.loading .button-text {
            display: none;
        }

        /* Features Section */
        .features {
            margin-top: 30px;
            padding-top: 25px;
            border-top: 2px solid #f0f0f0;
        }

        .features-title {
            font-size: 14px;
            font-weight: 600;
            color: #667eea;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 15px;
            text-align: center;
        }

        .feature {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            padding: 12px;
            background: #f8f9ff;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .feature:hover {
            background: #f0f2ff;
            transform: translateX(5px);
        }

        .feature:last-child {
            margin-bottom: 0;
        }

        .feature-icon {
            font-size: 24px;
            flex-shrink: 0;
        }

        .feature-text {
            color: #666;
            font-size: 14px;
            font-weight: 500;
            flex: 1;
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .card-body {
                padding: 30px;
            }

            .upload-area {
                padding: 40px 20px;
            }

            .header h1 {
                font-size: 30px;
            }

            .logo {
                font-size: 52px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo">📅</div>
            <h1>FamPilot</h1>
            <p>Extract event details from images instantly</p>
        </div>

        <!-- Main Card -->
        <div class="card">
            <div class="card-body">
                <form id="uploadForm" action="/upload" method="post" enctype="multipart/form-data">
                    <!-- Upload Area -->
                    <div class="upload-area" id="uploadArea">
                        <div class="upload-icon">📸</div>
                        <div class="upload-text">Click to upload or drag & drop</div>
                        <div class="upload-subtext">PNG, JPG, or JPEG • Max 10MB</div>
                        <input type="file" id="fileInput" name="file" accept="image/*" required>
                    </div>

                    <!-- Selected File Name -->
                    <div class="file-name" id="fileName">
                        <span class="file-name-icon">✓</span>
                        <span id="fileNameText"></span>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" id="submitBtn" disabled>
                        <span class="spinner"></span>
                        <span class="button-text">
                            <span>🚀</span>
                            <span>Extract Event Details</span>
                        </span>
                    </button>
                </form>

                <!-- Features -->
                <div class="features">
                    <div class="features-title">How it works</div>
                    <div class="feature">
                        <span class="feature-icon">🤖</span>
                        <span class="feature-text">AI-powered event extraction</span>
                    </div>
                    <div class="feature">
                        <span class="feature-icon">📅</span>
                        <span class="feature-text">Google Calendar integration</span>
                    </div>
                    <div class="feature">
                        <span class="feature-icon">✏️</span>
                        <span class="feature-text">Edit before confirming</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <p>Powered by Claude AI & Tesseract OCR</p>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileName = document.getElementById('fileName');
        const fileNameText = document.getElementById('fileNameText');
        const submitBtn = document.getElementById('submitBtn');
        const uploadForm = document.getElementById('uploadForm');

        // Click to upload
        uploadArea.addEventListener('click', () => {
            fileInput.click();
        });

        // File selection handler
        function handleFileSelect(file) {
            if (file && file.type.startsWith('image/')) {
                fileNameText.textContent = file.name;
                fileName.classList.add('show');
                submitBtn.disabled = false;
            }
        }

        // File input change
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            handleFileSelect(file);
        });

        // Drag and drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');

            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                fileInput.files = e.dataTransfer.files;
                handleFileSelect(file);
            }
        });

        // Form submission
        uploadForm.addEventListener('submit', (e) => {
            submitBtn.classList.add('loading');
            submitBtn.disabled = true;
        });
    </script>
</body>
</html>
