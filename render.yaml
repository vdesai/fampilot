databases:
  - name: fampilot-db
    plan: free
    databaseName: fampilot
    user: fampilot

services:
  - type: web
    name: fampilot
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: fampilot-db
          property: connectionString
